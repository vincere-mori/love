<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Светлячки</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: radial-gradient(ellipse at 50% 30%, #0e1820 0%, #060a0e 60%, #03050a 100%);
      overflow: hidden; height: 100vh; width: 100vw;
    }
    canvas { display: block; }
    #stage { width: 100%; height: 100%; }
    .caption {
      position: fixed; left: 0; right: 0; bottom: 8%;
      text-align: center;
      color: #e8e4cd;
      font-family: 'Cormorant Garamond', 'Georgia', serif;
      letter-spacing: 6px;
      font-size: clamp(14px, 1.6vw, 18px);
      text-transform: uppercase;
      pointer-events: none;
      opacity: 0;
      transition: opacity 2.4s ease 1.4s;
    }
    body.ready .caption { opacity: 0.85; }
    .hint {
      position: fixed; left: 0; right: 0; top: 6%;
      text-align: center;
      color: #4d5560;
      font-family: 'Cormorant Garamond', 'Georgia', serif;
      letter-spacing: 3px;
      font-size: 11px;
      text-transform: uppercase;
      pointer-events: none;
      opacity: 0;
      transition: opacity 2s ease 2.6s;
    }
    body.ready .hint { opacity: 0.7; }
  </style>
</head>
<body>
  <div id="stage"></div>
  <div class="hint">наведи · нажми</div>
  <div class="caption" id="cap"></div>
  <script>
    const params = new URLSearchParams(location.search);
    const TEXT = params.get('text') || params.get('name') || 'тёплый июльский вечер';
    document.getElementById('cap').textContent = TEXT;
    setTimeout(() => document.body.classList.add('ready'), 200);

    const sketch = (p) => {
      const N = 90;
      let bugs = [];
      let stars = [];
      let grass = [];
      let toHeart = 0;
      let t = 0;
      let mx = -9999, my = -9999;

      function heartXY(a) {
        return {
          x: 16 * Math.pow(p.sin(a), 3),
          y: -(13 * p.cos(a) - 5 * p.cos(2*a) - 2 * p.cos(3*a) - p.cos(4*a))
        };
      }

      p.setup = () => {
        p.createCanvas(p.windowWidth, p.windowHeight);
        p.noStroke();
        for (let i = 0; i < N; i++) {
          const a = (i / N) * p.TWO_PI;
          const xy = heartXY(a);
          const scale = p.min(p.width, p.height) * 0.022;
          bugs.push({
            x: p.random(p.width),
            y: p.random(p.height * 0.85),
            vx: p.random(-12, 12),
            vy: p.random(-8, 8),
            hx: p.width / 2 + xy.x * scale,
            hy: p.height / 2 + xy.y * scale - 30,
            phase: p.random(p.TWO_PI),
            speed: p.random(1.2, 2.8),
            hue: p.random(),
            size: p.random(1.2, 2.6),
            n0: p.random(1000)
          });
        }
        for (let i = 0; i < 80; i++) {
          stars.push({ x: p.random(p.width), y: p.random(p.height * 0.5),
                       r: p.random(0.3, 1.1), tw: p.random(p.TWO_PI), sp: p.random(0.6, 1.8) });
        }
        for (let i = 0; i < 140; i++) {
          grass.push({
            x: p.random(p.width),
            h: p.random(22, 70),
            phase: p.random(p.TWO_PI),
            sway: p.random(0.3, 1.1)
          });
        }
      };

      p.draw = () => {
        const dt = p.deltaTime / 1000;
        t += dt;
        p.background(3, 5, 10, 50);

        for (const s of stars) {
          const a = 0.5 + 0.5 * p.sin(t * s.sp + s.tw);
          p.fill(220, 220, 240, 140 * a);
          p.circle(s.x, s.y, s.r);
        }

        toHeart = p.max(0, toHeart - dt * 0.4);

        for (const f of bugs) {
          const targetX = f.hx, targetY = f.hy;
          if (toHeart > 0.01) {
            const k = toHeart;
            f.vx += (targetX - f.x) * 0.06 * k;
            f.vy += (targetY - f.y) * 0.06 * k;
          } else {
            const n = p.noise(f.x * 0.0015, f.y * 0.0015, f.n0 + t * 0.08);
            const ang = n * p.TWO_PI * 2;
            f.vx += p.cos(ang) * 6 * dt;
            f.vy += (p.sin(ang) * 6 - 1.2) * dt;
            if (mx > -1000) {
              const dx = mx - f.x, dy = my - f.y;
              const d2 = dx*dx + dy*dy;
              if (d2 < 200*200 && d2 > 1) {
                const inv = 1 / Math.sqrt(d2);
                const pull = (1 - Math.sqrt(d2) / 200) * 60;
                f.vx += dx * inv * pull * dt;
                f.vy += dy * inv * pull * dt;
              }
            }
          }
          f.vx *= 0.96; f.vy *= 0.96;
          f.x += f.vx * dt * 12;
          f.y += f.vy * dt * 12;
          if (f.x < -20) f.x = p.width + 20;
          if (f.x > p.width + 20) f.x = -20;
          if (f.y < -20) f.y = p.height + 20;
          if (f.y > p.height + 20) f.y = -20;

          const pulse = 0.4 + 0.6 * (0.5 + 0.5 * p.sin(t * f.speed + f.phase));
          const r = p.lerp(255, 235, f.hue);
          const g = p.lerp(220, 180, f.hue);
          const b = p.lerp(100, 80, f.hue);
          p.fill(r, g, b, 30 * pulse);
          p.circle(f.x, f.y, f.size * 22 * pulse);
          p.fill(r, g, b, 90 * pulse);
          p.circle(f.x, f.y, f.size * 10 * pulse);
          p.fill(255, 245, 200, 230 * pulse);
          p.circle(f.x, f.y, f.size * 2.4);
        }

        const groundY = p.height - 12;
        for (const gr of grass) {
          const wave = p.sin(t * gr.sway + gr.phase) * 4;
          p.stroke(8, 14, 10);
          p.strokeWeight(1.2);
          p.line(gr.x, groundY, gr.x + wave, groundY - gr.h);
          p.noStroke();
        }
        p.fill(2, 5, 8);
        p.rect(0, groundY - 1, p.width, 14);
      };

      p.mouseMoved = () => { mx = p.mouseX; my = p.mouseY; };
      p.mouseDragged = () => { mx = p.mouseX; my = p.mouseY; };
      p.mousePressed = () => { toHeart = 1; };
      p.windowResized = () => p.resizeCanvas(p.windowWidth, p.windowHeight);
    };
    new p5(sketch, document.getElementById('stage'));
  </script>
</body>
</html>
