<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Светлячки</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #04080e; overflow: hidden; height: 100vh; width: 100vw; }
    canvas { display: block; }
    #stage { width: 100%; height: 100%; }
    .caption {
      position: fixed; left: 0; right: 0; bottom: 8%;
      text-align: center;
      font-family: 'Cormorant Garamond', 'Georgia', serif;
      pointer-events: none; z-index: 5;
    }
    .caption .name {
      color: #e8dfb8;
      font-size: clamp(26px, 4.5vw, 52px);
      letter-spacing: 7px; font-weight: 300;
      opacity: 0; transition: opacity 2.5s ease 1.5s;
    }
    .caption .sub {
      margin-top: 10px; color: #7a7050;
      font-size: clamp(11px, 1.3vw, 14px);
      letter-spacing: 4px; font-style: italic;
      opacity: 0; transition: opacity 2s ease 2.8s;
    }
    body.ready .caption .name,
    body.ready .caption .sub { opacity: 1; }
    .hint {
      position: fixed; left: 0; right: 0; top: 5%;
      text-align: center; color: #3a3820;
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
      pointer-events: none;
      opacity: 0; transition: opacity 2s ease 4s;
    }
    body.ready .hint { opacity: 1; }
  </style>
</head>
<body>
  <div id="stage"></div>
  <div class="hint">мышь — притягивает · клик — собрать в сердце</div>
  <div class="caption">
    <div class="name" id="nm"></div>
    <div class="sub"  id="sb"></div>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    document.getElementById('nm').textContent = params.get('name') || 'июльский вечер';
    document.getElementById('sb').textContent = params.get('text') || 'ты светишься';
    setTimeout(() => document.body.classList.add('ready'), 300);

    const sketch = (p) => {
      const N = 80;
      let bugs = [];
      let heartMode = false;
      let heartTimer = 0;
      let t = 0;
      let noiseOff = 0;
      let pointerX = 0;
      let pointerY = 0;
      let pointerHeat = 0;

      function heartXY(i, total, scale) {
        const a = (p.TWO_PI / total) * i - p.HALF_PI;
        const x = 16 * Math.pow(p.sin(a), 3);
        const y = -(13 * p.cos(a) - 5 * p.cos(2*a) - 2 * p.cos(3*a) - p.cos(4*a));
        return { x: p.width/2 + x * scale, y: p.height/2 + y * scale };
      }

      p.setup = () => {
        p.createCanvas(p.windowWidth, p.windowHeight);
        p.pixelDensity(1);
        p.frameRate(60);
        p.noStroke();
        pointerX = p.width / 2;
        pointerY = p.height * 0.42;
        for (let i = 0; i < N; i++) {
          const x = p.random(p.width);
          const y = p.random(p.height * 0.1, p.height * 0.85);
          bugs.push({
            x, y,
            vx: p.random(-18, 18), vy: p.random(-12, 12),
            phase: p.random(p.TWO_PI), pulseSpeed: p.random(1.2, 2.6),
            hue: p.random(0.8, 1.0), size: p.random(1.8, 4.2),
            noiseX: p.random(1000), noiseY: p.random(1000),
            homeX: x, homeY: y,
            orbitRadius: p.random(18, 74),
            orbitSpeed: p.random(0.35, 0.9),
            followRadius: p.random(18, 48),
            followPhase: p.random(p.TWO_PI),
            pull: p.random(0.85, 1.25),
            heartX: 0, heartY: 0
          });
        }
        recalcHeart();
      };

      function recalcHeart() {
        const scale = p.min(p.width, p.height) * 0.022;
        bugs.forEach((b, i) => { const h = heartXY(i, N, scale); b.heartX = h.x; b.heartY = h.y; });
      }

      p.draw = () => {
        const dt = Math.min(p.deltaTime, 34) / 1000;
        t += dt; noiseOff += dt * 0.08;
        pointerHeat = p.max(0, pointerHeat - dt * 1.7);
        p.background(4, 8, 14, pointerHeat > 0 ? 58 : 40);

        p.fill(5, 13, 9, 200);
        p.beginShape();
        p.vertex(0, p.height);
        for (let x = 0; x <= p.width; x += 16) {
          const sw = p.sin(x * 0.04 + t * 0.3) * 10 + p.sin(x * 0.07 - t * 0.2) * 6;
          p.vertex(x, p.height - p.height * 0.1 * (0.4 + 0.6 * p.noise(x * 0.008)) + sw * 0.5);
        }
        p.vertex(p.width, p.height);
        p.endShape(p.CLOSE);

        heartTimer = p.max(0, heartTimer - dt);
        if (heartTimer <= 0) heartMode = false;

        for (const b of bugs) {
          if (heartMode) {
            const dx = b.heartX - b.x, dy = b.heartY - b.y;
            b.vx += dx * 0.42; b.vy += dy * 0.42;
            b.vx *= 0.70; b.vy *= 0.70;
          } else {
            const homeA = t * b.orbitSpeed + b.phase;
            const homeX = b.homeX + p.cos(homeA) * b.orbitRadius;
            const homeY = b.homeY + p.sin(homeA * 0.8) * b.orbitRadius * 0.45;
            const orbit = t * (1.3 + b.pull) + b.followPhase;
            const near = p.dist(homeX, homeY, pointerX, pointerY);
            const follow = pointerHeat * p.constrain((230 - near) / 130, 0, 1);
            const followX = pointerX + p.cos(orbit) * b.followRadius;
            const followY = pointerY + p.sin(orbit * 0.9) * b.followRadius * 0.65;
            const tx = p.lerp(homeX, followX, follow);
            const ty = p.lerp(homeY, followY, follow);
            const dx = tx - b.x, dy = ty - b.y;
            b.vx += dx * (0.028 + follow * 0.05) * b.pull;
            b.vy += dy * (0.028 + follow * 0.05) * b.pull;
            b.vx *= 0.88; b.vy *= 0.88;
          }
          const maxV = heartMode ? 420 : 160;
          b.vx = p.constrain(b.vx, -maxV, maxV);
          b.vy = p.constrain(b.vy, -maxV, maxV);
          b.x += b.vx * dt; b.y += b.vy * dt;
          if (b.x < -20) b.x = p.width + 20;
          if (b.x > p.width + 20) b.x = -20;
          b.y = p.constrain(b.y, -20, p.height * 0.9);

          const pulse = 0.55 + 0.45 * p.sin(t * b.pulseSpeed + b.phase);
          const r = p.lerp(190, 255, b.hue);
          const g = p.lerp(210, 255, b.hue);
          const bv = p.lerp(60, 130, b.hue);
          const aura = pointerHeat > 0 && !heartMode ? 4.6 : 5.5;
          const halo = pointerHeat > 0 && !heartMode ? 9 : 14;
          p.fill(r, g, bv, 220 * pulse);   p.circle(b.x, b.y, b.size);
          p.fill(r, g, bv, 55 * pulse);    p.circle(b.x, b.y, b.size * aura);
          p.fill(r, g, bv, 14 * pulse);    p.circle(b.x, b.y, b.size * halo);
        }
      };

      function setPointer(x, y) {
        pointerX = x;
        pointerY = y;
        pointerHeat = 1;
      }

      p.mouseMoved = () => setPointer(p.mouseX, p.mouseY);
      p.touchMoved = () => { if (p.touches.length) setPointer(p.touches[0].x, p.touches[0].y); return false; };
      p.touchStarted = () => { if (p.touches.length) setPointer(p.touches[0].x, p.touches[0].y); };
      p.mousePressed = () => { setPointer(p.mouseX, p.mouseY); heartMode = true; heartTimer = 5.2; recalcHeart(); };
      p.windowResized  = () => {
        p.resizeCanvas(p.windowWidth, p.windowHeight);
        pointerX = p.width / 2; pointerY = p.height * 0.42;
        bugs.forEach((b) => {
          b.homeX = p.random(p.width);
          b.homeY = p.random(p.height * 0.12, p.height * 0.82);
        });
        recalcHeart();
      };
    };

    new p5(sketch, document.getElementById('stage'));
  </script>
</body>
</html>
