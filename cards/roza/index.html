<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Роза</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0608; overflow: hidden; height: 100vh; width: 100vw; }
    canvas { display: block; }
    #stage { width: 100%; height: 100%; }
    .caption {
      position: fixed; left: 0; right: 0; bottom: 6%;
      text-align: center;
      color: #e8c4ce;
      font-family: 'Cormorant Garamond', 'Georgia', serif;
      letter-spacing: 5px;
      font-size: clamp(13px, 1.5vw, 16px);
      text-transform: uppercase;
      pointer-events: none;
      opacity: 0;
      transition: opacity 2s ease 2.5s;
    }
    body.ready .caption { opacity: 0.85; }
  </style>
</head>
<body>
  <div id="stage"></div>
  <div class="caption" id="cap"></div>
  <script>
    const params = new URLSearchParams(location.search);
    const TEXT = params.get('text') || params.get('name') || 'для тебя — роза';
    document.getElementById('cap').textContent = TEXT;

    const sketch = (p) => {
      const PHI = (1 + Math.sqrt(5)) / 2;
      const GOLD = p.TWO_PI / (PHI * PHI);
      let petals = [];
      let bloom = 0;
      let rotY = 0;
      let aimY = 0;
      let t = 0;
      let storm = 0;
      let particles = [];

      p.setup = () => {
        p.createCanvas(p.windowWidth, p.windowHeight);
        p.noStroke();
        const N = 130;
        for (let i = 0; i < N; i++) {
          const a = i * GOLD;
          const r = Math.sqrt(i / N);
          petals.push({
            i, a,
            radius: r,
            born: i / N,
            tilt: p.lerp(p.PI * 0.5, p.PI * 0.05, r),
            sz: p.lerp(28, 90, r),
            twist: p.random(-0.2, 0.2)
          });
        }
        setTimeout(() => document.body.classList.add('ready'), 300);
      };

      function rot3(x, y, z, ry) {
        const c = p.cos(ry), s = p.sin(ry);
        return [x * c + z * s, y, -x * s + z * c];
      }

      p.draw = () => {
        const dt = p.deltaTime / 1000;
        t += dt;
        p.background(10, 6, 8, 70);
        bloom = p.min(1, bloom + dt * 0.08);

        aimY = (p.mouseX - p.width/2) / p.width * 1.2;
        rotY += (aimY - rotY) * 0.04 + dt * 0.18;

        const cx = p.width / 2, cy = p.height / 2 + 30;
        const scale = p.min(p.width, p.height) * 0.0028;
        const focal = 500;

        storm = p.max(0, storm - dt * 0.5);

        const items = [];
        for (const pt of petals) {
          const lOp = p.constrain((bloom - pt.born * 0.6) / 0.4, 0, 1);
          if (lOp < 0.01) continue;
          const eOp = lOp < 0.5 ? 4 * lOp * lOp * lOp : 1 - p.pow(-2 * lOp + 2, 3) / 2;
          const baseR = pt.radius * 140;
          const tilt = pt.tilt;
          const cosT = p.cos(tilt), sinT = p.sin(tilt);
          const angle = pt.a + p.sin(t * 0.4 + pt.i) * 0.02;
          const dist = baseR * eOp;
          const x3 = p.cos(angle) * dist * cosT;
          const z3 = p.sin(angle) * dist * cosT;
          const y3 = -sinT * dist;
          const [rx, ry, rz] = rot3(x3, y3, z3, rotY);
          const ps = focal / (focal + rz * 0.5);
          const sx = cx + rx * scale * ps * 2.3;
          const sy = cy + ry * scale * ps * 2.3;
          const sz = pt.sz * ps * scale * 2.3 * eOp;
          const viewAng = p.atan2(ry, rx) + pt.twist;
          const light = p.map(-rz, -100, 100, 0.6, 1.3);
          const r = p.constrain(p.lerp(140, 230, pt.radius) * light, 0, 255);
          const g = p.constrain(p.lerp(20, 90, pt.radius) * light, 0, 200);
          const b = p.constrain(p.lerp(40, 110, pt.radius) * light, 0, 200);
          items.push({ rz, sx, sy, sz, ang: viewAng, r, g, b, idx: pt.i, op: eOp });
        }
        items.sort((a, b) => a.rz - b.rz);
        for (const it of items) {
          if (it.sz < 1) continue;
          p.push();
          p.translate(it.sx, it.sy);
          p.rotate(it.ang);
          for (let pass = 0; pass < 2; pass++) {
            const tint = pass === 0 ? 1 : 0.6;
            p.fill(it.r * tint, it.g * tint, it.b * tint, 230);
            p.beginShape();
            const w = it.sz, h = it.sz * 0.7;
            for (let a = 0; a <= p.TWO_PI; a += p.PI / 14) {
              const ruf = p.sin(a * 4 + it.idx) * 0.12;
              const rr = (1 + ruf) * (pass === 0 ? 1 : 0.65);
              p.vertex(p.cos(a) * w * rr, p.sin(a) * h * rr);
            }
            p.endShape(p.CLOSE);
          }
          p.fill(255, 220, 230, 50);
          p.ellipse(0, -it.sz * 0.15, it.sz * 0.5, it.sz * 0.3);
          p.pop();
        }

        if (storm > 0.01) {
          for (let i = 0; i < 6; i++) {
            particles.push({
              x: p.random(p.width),
              y: -10,
              vx: p.random(-30, 30),
              vy: p.random(40, 110),
              life: p.random(3, 6),
              age: 0,
              rot: p.random(p.TWO_PI),
              vrot: p.random(-2, 2),
              sz: p.random(8, 22),
              hue: p.random()
            });
          }
        }
        for (let i = particles.length - 1; i >= 0; i--) {
          const pp = particles[i];
          pp.age += dt;
          if (pp.age > pp.life) { particles.splice(i, 1); continue; }
          pp.x += pp.vx * dt + Math.sin(pp.age * 1.5 + pp.rot) * 18 * dt;
          pp.y += pp.vy * dt;
          pp.rot += pp.vrot * dt;
          const alpha = p.constrain((1 - pp.age / pp.life) * 255, 0, 255);
          p.push();
          p.translate(pp.x, pp.y);
          p.rotate(pp.rot);
          const r = p.lerp(180, 240, pp.hue);
          const g = p.lerp(40, 110, pp.hue);
          const b = p.lerp(60, 130, pp.hue);
          p.fill(r, g, b, alpha);
          p.ellipse(0, 0, pp.sz, pp.sz * 0.6);
          p.pop();
        }
      };

      p.mousePressed = () => { storm = 1; };
      p.windowResized = () => p.resizeCanvas(p.windowWidth, p.windowHeight);
    };
    new p5(sketch, document.getElementById('stage'));
  </script>
</body>
</html>
